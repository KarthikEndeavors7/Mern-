name: CI/CD Pipeline (Windows)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: windows-latest  # GitHub-hosted Windows runner

    steps:
       Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

       Docker login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: karthikendeavours25
          password: karthik2512

       Build Docker image
      - name: Build Docker Image
        shell: powershell
        run: |
          docker build --pull -t karthikendeavours25/idurar-app:latest ./frontend

       Push Docker image to Docker Hub
      - name: Push Docker Image
        shell: powershell
        run: |
          docker push karthikendeavours25/idurar-app:latest
          
 Deploy to Localhost     
      - name: Deploy Container on Localhost
      shell: powershell
         run: |
           docker rm -f idurar-erp-crm 2>$null || echo "No container to remove"
           docker run -d --name idurar-erp-crm -p 3000:3000 karthikendeavours25/idurar-app:latest

