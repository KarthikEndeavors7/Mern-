name: CI/CD Pipeline (Windows)

on:
  push:
    branches:
      - main   # Run workflow when pushing to main branch

jobs:
  build-and-deploy:
    runs-on: windows-latest   # ✅ Windows runner

    steps:
      # Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v3

      # Login to Docker Hub
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: karthikendeavours25
          password: karthik2512

      # Build Docker image
      - name: Build Docker Image
        shell: powershell
        run: |
          docker build --pull -t karthikendeavours25/idurar-app:latest ./frontend

      # Push Docker image
      - name: Push Docker Image
        shell: powershell
        run: |
          docker push karthikendeavours25/idurar-app:latest

      # Commit GitHub changes (optional)
      - name: Commit GitHub Changes
        shell: powershell
        run: |
          git config --global user.name "KarthikEndeavors7"
          git config --global user.email "karthik.endeavors@gmail.com"
          git add .
          git commit -m "Auto commit from GitHub Actions" || echo "No changes to commit"
          git push origin main

      # Deploy container on localhost
      - name: Deploy Container on Localhost
        shell: powershell
        run: |
          docker stop idurar-erp-crm 2>$null || echo "No container running"
          docker rm idurar-erp-crm 2>$null || echo "No container to remove"
          docker run -d --name idurar-erp-crm -p 3000:3000 karthikendeavours25/idurar-app:latest
