# File: .github/workflows/ci-cd.yml
name: MERN CI/CD Pipeline

on:
  push:
    branches:
      - main   # Trigger workflow on pushes to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    # 1️⃣ Checkout the repo
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Log in to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}

    # 3️⃣ Build Docker images
    - name: Build Backend Docker Image
      run: |
        docker build -t ${{ env.DOCKER_USERNAME }}/mern-backend:latest ./backend

    - name: Build Frontend Docker Image
      run: |
        docker build -t ${{ env.DOCKER_USERNAME }}/mern-frontend:latest ./frontend

    # 4️⃣ Push Docker images to Docker Hub
    - name: Push Backend Docker Image
      run: docker push ${{ env.DOCKER_USERNAME }}/mern-backend:latest

    - name: Push Frontend Docker Image
      run: docker push ${{ env.DOCKER_USERNAME }}/mern-frontend:latest

    # 5️⃣ Git push (if needed, e.g., after version bump)
    - name: Commit & Push Changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Automated commit from CI/CD" || echo "No changes to commit"
        git push origin main

    # 6️⃣ Deploy to localhost
    - name: Deploy on Localhost
      run: |
        docker stop mern-backend || true
        docker rm mern-backend || true
        docker stop mern-frontend || true
        docker rm mern-frontend || true
        docker run -d -p 5000:5000 --name mern-backend ${{ env.DOCKER_USERNAME }}/mern-backend:latest
        docker run -d -p 3000:3000 --name mern-frontend ${{ env.DOCKER_USERNAME }}/mern-frontend:latest
