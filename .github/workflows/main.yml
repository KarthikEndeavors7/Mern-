name: CI/CD Pipeline (Windows)

on:
  push:
    branches:
      - main   # Run workflow when pushing to main branch

jobs:
  build-and-deploy:
    runs-on: self-hosted   # Runs on your Windows machine (GitHub self-hosted runner)

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Login to Docker Hub
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: karthikendeavours25
          password: karthik2512

      # Build Docker Image
      - name: Build Docker Image
        shell: powershell
        run: |
          docker build -t karthikendeavours25/idurar-app:latest .

      # Push Docker Image to Docker Hub
      - name: Push Docker Image
        shell: powershell
        run: |
          docker push karthikendeavours25/idurar-app:latest

      # Push changes back to GitHub
      - name: Push GitHub Code
        shell: powershell
        run: |
          git config --global user.name  KarthikEndeavors7 
          git config --global user.email karthik.endeavors@gmail.com
          git add .
          git commit -m "Auto commit from GitHub Actions" || echo "No changes"
          git push origin main

      # Deploy to Localhost
      - name: Deploy Container on Localhost
        shell: powershell
        run: |
          docker stop idurar-erp-crm 2>$null || echo "No container running"
          docker rm idurar-erp-crm 2>$null || echo "No container to remove"
          docker run -d --name idurar-erp-crm -p 3000:3000 karthikendeavours25/idurar-app:latest
