name: CI/CD Pipeline (Windows)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: karthikendeavours25
          password: karthik2512

      - name: Build Docker Image
  shell: powershell
  run: |
    docker build --pull -t karthikendeavours25/idurar-app:latest ./frontend


      - name: Push Docker Image
        shell: powershell
        run: |
          docker push karthikendeavours25/idurar-app:latest

      - name: Commit GitHub Changes
        shell: powershell
        run: |
          git config --global user.name "KarthikEndeavors7"
          git config --global user.email "karthik.endeavors@gmail.com"
          git add .
          git commit -m "Auto commit from GitHub Actions" || echo "No changes to commit"
          git push origin main

          - name: Deploy Container on Localhost
  shell: powershell
  run: |
    docker rm -f idurar-erp-crm 2>$null || Write-Host "No container to remove"
    docker run -d --name idurar-erp-crm -p 3000:3000 karthikendeavours25/idurar-app:latest
