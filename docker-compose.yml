version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/mydb
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "3000:80"   # Map container port 80 to host port 3000

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
